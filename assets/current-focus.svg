<svg width="825" height="156" viewBox="0 0 825 156" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Current focus</title>
  <desc id="desc">A compact panel showing JieteXue's current focus areas: math models, physics intuition, knowledge notes, and open source.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="825" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="rule" x1="44" y1="0" x2="781" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.42" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="825" height="156" rx="16" fill="url(#panel)"/>
  <rect x="1" y="1" width="823" height="154" rx="15" stroke="#38BDF8" stroke-opacity="0.28" stroke-width="2"/>
  <path d="M44 50 H781" stroke="url(#rule)" stroke-width="2" stroke-linecap="round"/>

  <text x="44" y="34" fill="#E5E7EB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Current Focus</text>
  <text x="212" y="34" fill="#94A3B8" font-family="JetBrains Mono, Consolas, monospace" font-size="13">math -> physics -> notes -> code</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(44 74)">
      <rect width="166" height="48" rx="10" fill="#020617" fill-opacity="0.54" stroke="#38BDF8" stroke-opacity="0.34"/>
      <text x="18" y="21" fill="#38BDF8" font-size="12" font-weight="800">01</text>
      <text x="50" y="21" fill="#E5E7EB" font-size="15" font-weight="800">Math models</text>
      <text x="18" y="38" fill="#94A3B8" font-size="11">proofs, structure, patterns</text>
    </g>
    <g transform="translate(228 74)">
      <rect width="166" height="48" rx="10" fill="#020617" fill-opacity="0.54" stroke="#A78BFA" stroke-opacity="0.34"/>
      <text x="18" y="21" fill="#A78BFA" font-size="12" font-weight="800">02</text>
      <text x="50" y="21" fill="#E5E7EB" font-size="15" font-weight="800">Physics intuition</text>
      <text x="18" y="38" fill="#94A3B8" font-size="11">fields, motion, symmetry</text>
    </g>
    <g transform="translate(412 74)">
      <rect width="166" height="48" rx="10" fill="#020617" fill-opacity="0.54" stroke="#60A5FA" stroke-opacity="0.34"/>
      <text x="18" y="21" fill="#60A5FA" font-size="12" font-weight="800">03</text>
      <text x="50" y="21" fill="#E5E7EB" font-size="15" font-weight="800">Knowledge notes</text>
      <text x="18" y="38" fill="#94A3B8" font-size="11">clean ideas, linked writing</text>
    </g>
    <g transform="translate(596 74)">
      <rect width="185" height="48" rx="10" fill="#020617" fill-opacity="0.54" stroke="#F59E0B" stroke-opacity="0.34"/>
      <text x="18" y="21" fill="#F59E0B" font-size="12" font-weight="800">04</text>
      <text x="50" y="21" fill="#E5E7EB" font-size="15" font-weight="800">Open source</text>
      <text x="18" y="38" fill="#94A3B8" font-size="11">small tools, readable systems</text>
    </g>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="76" cy="132" r="3" fill="#38BDF8"/>
    <circle cx="260" cy="132" r="3" fill="#A78BFA"/>
    <circle cx="444" cy="132" r="3" fill="#60A5FA"/>
    <circle cx="628" cy="132" r="3" fill="#F59E0B"/>
    <path d="M79 132 H257 M263 132 H441 M447 132 H625 M631 132 H748" stroke="#38BDF8" stroke-opacity="0.24" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
