<svg width="825" height="220" viewBox="0 0 825 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zhihu writing orbit</title>
  <desc id="desc">A decorative panel linking JieteXue's math and physics interests with writing on Zhihu.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="825" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#031525"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(203 110) rotate(90) scale(72)">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.12"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="825" height="220" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="823" height="218" rx="17" stroke="#60A5FA" stroke-opacity="0.28" stroke-width="2"/>

  <circle cx="203" cy="110" r="72" fill="url(#core)" filter="url(#glow)"/>
  <ellipse cx="203" cy="110" rx="124" ry="38" stroke="#38BDF8" stroke-opacity="0.52" stroke-width="2"/>
  <ellipse cx="203" cy="110" rx="124" ry="38" stroke="#A78BFA" stroke-opacity="0.35" stroke-width="2" transform="rotate(-32 203 110)"/>
  <ellipse cx="203" cy="110" rx="124" ry="38" stroke="#F59E0B" stroke-opacity="0.34" stroke-width="2" transform="rotate(32 203 110)"/>
  <circle cx="314" cy="92" r="7" fill="#F59E0B" filter="url(#glow)"/>
  <circle cx="110" cy="143" r="5" fill="#A78BFA" filter="url(#glow)"/>
  <text x="168" y="124" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">知乎</text>

  <text x="385" y="64" fill="#E5E7EB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">Writing as a way to think</text>
  <text x="385" y="95" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">I share math/physics notes, questions, and small sparks on Zhihu.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <g transform="translate(385 123)">
      <rect width="112" height="34" rx="9" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.36"/>
      <text x="18" y="22" fill="#E5E7EB">Math notes</text>
    </g>
    <g transform="translate(511 123)">
      <rect width="128" height="34" rx="9" fill="#0F172A" stroke="#A78BFA" stroke-opacity="0.36"/>
      <text x="18" y="22" fill="#E5E7EB">Physics ideas</text>
    </g>
    <g transform="translate(653 123)">
      <rect width="92" height="34" rx="9" fill="#0F172A" stroke="#F59E0B" stroke-opacity="0.36"/>
      <text x="18" y="22" fill="#E5E7EB">Zhihu</text>
    </g>
  </g>

  <text x="385" y="185" fill="#38BDF8" font-family="JetBrains Mono, Consolas, monospace" font-size="14">zhihu.com/people/7-63-5-13-42</text>
</svg>
