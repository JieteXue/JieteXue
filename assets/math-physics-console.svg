<svg width="825" height="245" viewBox="0 0 825 245" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Math and physics console</title>
  <desc id="desc">A terminal-inspired panel introducing JieteXue as a math and physics enthusiast who writes on Zhihu.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="825" y2="245" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#082F49"/>
    </linearGradient>
    <linearGradient id="accent" x1="40" y1="0" x2="785" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="825" height="245" rx="18" fill="url(#panel)"/>
  <rect x="1" y="1" width="823" height="243" rx="17" stroke="#38BDF8" stroke-opacity="0.32" stroke-width="2"/>
  <path d="M38 72 H787" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>

  <circle cx="38" cy="36" r="7" fill="#EF4444"/>
  <circle cx="62" cy="36" r="7" fill="#F59E0B"/>
  <circle cx="86" cy="36" r="7" fill="#22C55E"/>
  <text x="118" y="42" fill="#94A3B8" font-family="JetBrains Mono, Consolas, monospace" font-size="14">jietexue@github: ~/math-physics</text>

  <g font-family="JetBrains Mono, Consolas, monospace" font-size="18">
    <text x="40" y="108" fill="#38BDF8">$ identity</text>
    <text x="178" y="108" fill="#E5E7EB">math &amp; physics enthusiast</text>
    <text x="40" y="148" fill="#38BDF8">$ notebook</text>
    <text x="166" y="148" fill="#E5E7EB">proofs · models · simulations · visual intuition</text>
    <text x="40" y="188" fill="#38BDF8">$ signal</text>
    <text x="142" y="188" fill="#E5E7EB">turning equations into notes, questions, and code</text>
  </g>

  <g filter="url(#softGlow)" opacity="0.95">
    <rect x="586" y="88" width="204" height="116" rx="14" fill="#020617" fill-opacity="0.48" stroke="#38BDF8" stroke-opacity="0.3"/>
    <text x="608" y="122" fill="#A78BFA" font-family="Georgia, Times New Roman, serif" font-size="27">e<tspan baseline-shift="super" font-size="15">iπ</tspan> + 1 = 0</text>
    <text x="608" y="157" fill="#38BDF8" font-family="Georgia, Times New Roman, serif" font-size="23">∇ · E = ρ / ε<tspan baseline-shift="sub" font-size="13">0</tspan></text>
    <path d="M608 176 H768" stroke="#38BDF8" stroke-opacity="0.24" stroke-width="1"/>
    <text x="608" y="194" fill="#F59E0B" font-family="JetBrains Mono, Consolas, monospace" font-size="12">math ⇄ physics ⇄ code</text>
  </g>
</svg>
