name: Snake

on:
  schedule:
    - cron: "20 20 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: JieteXue
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Check out output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch

      - name: Publish contribution snake
        run: |
          cp dist/github-contribution-grid-snake.svg output-branch/github-contribution-grid-snake.svg
          cp dist/github-contribution-grid-snake-dark.svg output-branch/github-contribution-grid-snake-dark.svg
          cd output-branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git commit -m "Generate contribution snake" || exit 0
          git pull --rebase origin output
          git push origin output
